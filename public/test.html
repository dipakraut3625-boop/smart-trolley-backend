<!DOCTYPE html>
<html>
<head>
  <title>Test Create Bill</title>
</head>
<body>

<h1>Test Create Bill</h1>

<button onclick="createBill()">Create Bill</button>

<p id="result"></p>

<script>
function createBill() {

  fetch("/api/create-bill", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      items: [
        { name: "Milk", qty: 1, price: 45 },
        { name: "Bread", qty: 2, price: 30 }
      ]
    })
  })
  .then(res => res.json())
  .then(data => {

    console.log("RESPONSE:", data);

    if (!data.success) {
      document.getElementById("result").innerText = "Error!";
      return;
    }

    // ✅ FIX HERE
    document.getElementById("result").innerText =
      "Bill Created: " + data.billId;

    // 🔥 AUTO OPEN BILL PAGE
    window.location.href = data.url;

  })
  .catch(err => {
    console.log(err);
    document.getElementById("result").innerText = "Failed!";
  });
}
</script>

</body>
</html>
